name: CI/CD Pipeline - Food Order Microservices

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-scan:
    name: Build, Test & Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            context: ./services/user_service
          - service: menu-service
            context: ./services/menu_service
          - service: order-service
            context: ./services/order_service
          - service: payment-service
            context: ./services/payment_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.context }}
        run: npm install

      - name: Run unit tests
        working-directory: ${{ matrix.context }}
        run: npm test

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ matrix.context }}
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}_${{ matrix.service }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,coverage/**,**/*.test.js
            -Dsonar.branch.name=main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk vulnerability scan
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=${{ matrix.context }}/package.json

      - name: Build Docker image
        run: |
          docker build -t food-order-${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}
          echo "Docker image built: food-order-${{ matrix.service }}:${{ github.sha }}"

  health-check:
    name: Health Check - Live Azure Services
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check all live Azure services are healthy
        run: |
          echo "Checking live Azure Container Apps services..."
          ALL_OK=true

          for SERVICE in "USER:${{ secrets.USER_SERVICE_URL }}" "MENU:${{ secrets.MENU_SERVICE_URL }}" "ORDER:${{ secrets.ORDER_SERVICE_URL }}" "PAYMENT:${{ secrets.PAYMENT_SERVICE_URL }}"; do
            NAME=$(echo $SERVICE | cut -d: -f1)
            URL=$(echo $SERVICE | cut -d: -f2-)
            echo "Checking $NAME service at $URL/health"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo " $NAME service is UP (HTTP 200)"
            else
              echo "  $NAME service returned HTTP $STATUS"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = "true" ]; then
            echo ""
            echo " All 4 Azure services are healthy!"
          else
            echo ""
            echo " Some services may be starting up. Check Azure Portal for details."
          fi
