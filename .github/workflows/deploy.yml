name: CI/CD Pipeline - Food Order Microservices

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-scan:
    name: Build, Test & Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            context: ./services/user_service
          - service: menu-service
            context: ./services/menu_service
          - service: order-service
            context: ./services/order_service
          - service: payment-service
            context: ./services/payment_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.context }}
        run: npm install

      - name: Run unit tests
        working-directory: ${{ matrix.context }}
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ matrix.context }}
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}_${{ matrix.service }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,coverage/**,**/*.test.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=${{ matrix.context }}/package.json

      - name: Build Docker image
        run: |
          docker build -t food-order-${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}
          echo "Docker image built successfully: food-order-${{ matrix.service }}:${{ github.sha }}"

  health-check:
    name: Health Check - Live Azure Services
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check all live Azure services are healthy
        run: |
          echo "Checking live Azure Container Apps services..."

          for URL in \
            "${{ secrets.USER_SERVICE_URL }}/health" \
            "${{ secrets.MENU_SERVICE_URL }}/health" \
            "${{ secrets.ORDER_SERVICE_URL }}/health" \
            "${{ secrets.PAYMENT_SERVICE_URL }}/health"; do

            echo "Checking: $URL"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")

            if [ "$STATUS" = "200" ]; then
              echo "  OK: $URL returned 200"
            else
              echo "  WARNING: $URL returned $STATUS"
            fi
          done

          echo "All health checks completed."
